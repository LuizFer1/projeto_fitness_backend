name: CI & FTP Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Run PHPUnit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Validate composer files
        run: composer validate --strict --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          BCRYPT_ROUNDS: 4
        run: php artisan test --testsuite=Unit,Feature

  deploy:
    name: Deploy to FTP
    needs: tests
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer (prod) dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-prod-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-prod-${{ runner.os }}-

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader --classmap-authoritative

      - name: Resolve APP_KEY (use secret or generate)
        id: appkey
        run: |
          if [ -n "${{ secrets.APP_KEY }}" ]; then
            echo "Using APP_KEY from repository secret."
            echo "value=${{ secrets.APP_KEY }}" >> "$GITHUB_OUTPUT"
          else
            KEY="base64:$(php -r 'echo base64_encode(random_bytes(32));')"
            echo "::warning::Nenhum secret APP_KEY definido. Foi gerado automaticamente: $KEY"
            echo "::warning::Salve este valor em Settings → Secrets → APP_KEY para mantê-lo estável entre deploys."
            echo "value=$KEY" >> "$GITHUB_OUTPUT"
          fi

      - name: Build production .env
        env:
          APP_KEY: ${{ steps.appkey.outputs.value }}
        run: |
          cat > .env <<EOF
          APP_NAME=Coreva
          APP_ENV=production
          APP_KEY=${APP_KEY}
          APP_DEBUG=false
          APP_URL=http://api-coreva.luizfdev.com.br
          APP_LOCALE=pt_BR
          APP_FALLBACK_LOCALE=en

          LOG_CHANNEL=stack
          LOG_LEVEL=warning

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          CACHE_STORE=database
          QUEUE_CONNECTION=database
          FILESYSTEM_DISK=local

          BCRYPT_ROUNDS=12

          SANCTUM_STATEFUL_DOMAINS=coreva.luizfdev.com.br,api-coreva.luizfdev.com.br
          EOF

      - name: Clear any stale caches (do NOT pre-cache on runner)
        env:
          APP_KEY: ${{ steps.appkey.outputs.value }}
        run: |
          # Caches geradas no runner contêm caminhos absolutos do GitHub Actions
          # (/home/runner/work/...) e quebram o Laravel em produção. Limpamos e
          # deixamos o servidor gerar os caches sob demanda a partir do .env.
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear
          rm -f bootstrap/cache/config.php bootstrap/cache/routes-v7.php bootstrap/cache/routes.php

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Remove stale caches from server (bootstrap/cache)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || '/' }}
        run: |
          # Apaga caches antigos que possam conter caminhos absolutos do runner
          # (ex.: /home/runner/work/...). Ignora erro caso o arquivo não exista.
          lftp -c "
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 2;
            set net:timeout 30;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            cd \"$FTP_SERVER_DIR\";
            rm -f bootstrap/cache/config.php || true;
            rm -f bootstrap/cache/routes-v7.php || true;
            rm -f bootstrap/cache/routes.php || true;
            rm -f bootstrap/cache/events.php || true;
            bye
          " || true

      - name: Deploy via FTP (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR || '/' }}
        run: |
          lftp -c "
            set ftp:ssl-allow true;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set net:timeout 30;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            mirror -R -v --parallel=4 --only-newer \
              --exclude-glob '.git*' \
              --exclude '.github/' \
              --exclude 'node_modules/' \
              --exclude 'tests/' \
              --exclude-glob '.env.example' \
              --exclude-glob '.env.backup' \
              --exclude-glob '.env.production' \
              --exclude-glob '.editorconfig' \
              --exclude-glob '.gitignore' \
              --exclude-glob '.gitattributes' \
              --exclude-glob 'phpunit.xml' \
              --exclude-glob 'phpunit.xml.dist' \
              --exclude-glob 'README.md' \
              --exclude-glob 'AGENT_INTEGRATION.md' \
              --exclude-glob 'CLAUDE.md' \
              --exclude-glob 'Makefile' \
              --exclude-glob 'docker-compose.yml' \
              --exclude-glob 'Dockerfile' \
              --exclude 'docker/' \
              --exclude 'scripts/' \
              --exclude 'storage/logs/' \
              --exclude 'storage/framework/cache/' \
              --exclude 'storage/framework/sessions/' \
              --exclude 'storage/framework/views/' \
              --exclude 'storage/framework/testing/' \
              --exclude-glob 'bootstrap/cache/config.php' \
              --exclude-glob 'bootstrap/cache/routes-v7.php' \
              --exclude-glob 'bootstrap/cache/routes.php' \
              --exclude-glob 'bootstrap/cache/events.php' \
              --exclude-glob 'database/database.sqlite' \
              --exclude-glob '.phpunit.result.cache' \
              --exclude '.phpunit.cache/' \
              --exclude 'docs/' \
              --exclude '.idea/' \
              --exclude '.vscode/' \
              --exclude 'memory/' \
              ./ \"$FTP_SERVER_DIR\";
            bye
          "
