name: CI & FTP Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

jobs:
  tests:
    name: Run PHPUnit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run Pint (code style)
        run: ./vendor/bin/pint --test
        continue-on-error: true

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          BCRYPT_ROUNDS: 4
        run: php artisan test --testsuite=Unit,Feature

  deploy:
    name: Deploy to FTP
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, bcmath, intl, gd, zip
          coverage: none
          tools: composer:v2

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Optimize Laravel for production
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.*
            **/.editorconfig
            **/.gitignore
            **/.gitattributes
            **/phpunit.xml
            **/phpunit.xml.dist
            **/README.md
            **/AGENT_INTEGRATION.md
            **/CLAUDE.md
            **/Makefile
            **/docker-compose.yml
            **/docker/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/framework/testing/**
            **/database/database.sqlite
            **/.phpunit.result.cache
            **/.phpunit.cache/**
            **/docs/**
            **/.idea/**
            **/.vscode/**
